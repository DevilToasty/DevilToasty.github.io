<!doctype html>
<html>
  <head>
    <style>
      .buttonPress {
        width: 10%;
        height: 50px;
        position: relative;
        top: 480px;
        background-color: red;
        border-radius: 1rem;
        font-family:
          "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS", sans-serif;
      }

      a.button-style {
        text-decoration: none;
        color: black;
        font-family:
          "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS", sans-serif;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        min-width: 100%;
        max-width: 100%;
        padding: 0;
        margin: 0;
        overflow: hidden;
      }

      /*LOCKED in*/
      @keyframes wiggle {
        0% {
          transform: rotateZ(2deg) translateX(0);
        }
        15% {
          transform: rotateZ(3deg) translateX(-8px);
        }
        30% {
          transform: rotateZ(1deg) translateX(8px);
        }
        45% {
          transform: rotateZ(-2deg) translateX(-6px);
        }
        60% {
          transform: rotateZ(-3deg) translateX(6px);
        }
        75% {
          transform: rotateZ(-1deg) translateX(-3px);
        }
        100% {
          transform: rotateZ(0deg) translateX(0);
        }
      }

      #page.wiggle {
        animation: wiggle 0.5s ease-in-out;
      }
    </style>
  </head>

  <body style="background-color: rgba(100, 200, 200, 0.5); position: relative">
    <div id="page" style="position: relative; align-content: center">
      <img
        src="/Week2/BRADLEYBREEN_OurFirstGame/images/start_image.JPG"
        alt="my snowy house"
        aria-label="my snowy background"
        style="width: 100%; position: absolute; top: 0; left: 0; z-index: -1"
      />

      <!--- -->
      <div
        style="
          display: flex;
          flex-direction: row;
          justify-content: center;
          align-items: center;
          position: relative;
        "
      >
        <!--- Spacer to divide section-->
        <br />

        <h1
          style="
            font-size: 44;
            background-color: #109090;
            width: auto;
            padding-left: 10px;
            padding-right: 10px;
            border-radius: 10px;
            text-align: center;
            position: absolute;
            top: 0;
            z-index: 20;
          "
        >
          TORTS THE GAME
        </h1>
      </div>

      <button class="buttonPress" style="left: 5%; background-color: red">
        <a href="./battle-pass.html" class="button-style">Fight the Torts</a>
      </button>

      <button class="buttonPress" style="left: 75%; background-color: gray">
        <a href="./secret-location.html" class="button-style"
          >Secret Entrance</a
        >
      </button>

      <ul class="list" style="font-family: monospace">
        <h2>List of my top ten things</h2>
        <li>Lists</li>
        <li>The number 2</li>
        <li>Orderings</li>
        <li>I'm out of ideas</li>
        <h3
          id="wiggle_button"
          style="
            text-decoration: underline;
            display: inline;
            background-color: bisque;
          "
        >
          Make this page wiggle
        </h3>
      </ul>
    </div>
    <div style="height: 45%"></div>

    <section
      id="playlsits"
      style="
        position: relative;
        display: inline-table;
        align-content: center;
        padding-left: 20px;
        font-family:
          Impact, Haettenschweiler, &quot;Arial Narrow Bold&quot;, sans-serif;
        text-shadow: 1px 1px 2px pink;
      "
    >
      <ol
        style="
          background-color: rgba(200, 06, 105, 0.8);
          padding: 20px;
          padding-left: 30px;
          color: rgb(255, 255, 255);
        "
      >
        <li>
          <a
            href="https://music.apple.com/us/playlist/pocket-pays-the-bills/pl.u-38oWokbCYKA03G"
            target="_blank"
            style="color: rgba(13, 104, 113, 0.8)"
            >Best drum grooves</a
          >
        </li>
        <br />
        <li>
          <a
            href="https://music.apple.com/us/playlist/the-kitchen/pl.u-38oWpWyuYKA03G"
            target="_blank"
            style="color: rgba(13, 104, 113, 0.8)"
            >My favorite songs</a
          >
        </li>
        <br />
        <li>
          <a
            href="https://music.apple.com/us/album/forever-live-sessions-vol-2/1791882052"
            target="_blank"
            style="color: rgba(13, 104, 113, 0.8)"
            >Best album ever</a
          >
        </li>
      </ol>
    </section>
    <script>
      const page = document.getElementById("page");
      const wiggleBtn = document.getElementById("wiggle_button");

      wiggleBtn.addEventListener("mouseenter", () => {
        wiggleBtn.style.cursor = "pointer";
      });

      wiggleBtn.addEventListener("mouseleave", () => {
        wiggleBtn.style.cursor = "default";
      });

      wiggleBtn.addEventListener("click", () => {
        page.classList.remove("wiggle");
        void page.offsetWidth;
        page.classList.add("wiggle");
      });
    </script>
  </body>
</html>
