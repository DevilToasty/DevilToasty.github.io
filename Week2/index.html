<!doctype html>
<html>
  <head>
    <style>
      .buttonPress {
        width: 10%;
        height: 50px;
        position: relative;
        top: 480px;
        background-color: red;
        border-radius: 1rem;
        font-family:
          "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS", sans-serif;
      }

      .gitbutton {
        width: 80px;
        height: 40px;
        position: relative;
        background-color: red;
        font-family:
          "Lucida Sans", "Lucida Sans Regular", "Lucida Grande",
          "Lucida Sans Unicode", Geneva, Verdana, sans-serif;
      }

      .hwButton {
        width: 100px;
        height: 40px;
        position: relative;
        background-color: green;
        font-family:
          "Lucida Sans", "Lucida Sans Regular", "Lucida Grande",
          "Lucida Sans Unicode", Geneva, Verdana, sans-serif;
      }

      .hidden {
        opacity: 0%;
        transition: opacity 0.5s;
      }

      .shown {
        opacity: 100%;
        transition: opacity 0.5s;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        min-width: 100%;
        max-width: 100%;
        padding: 0;
        margin: 0;
        overflow: hidden;
      }

      img {
        transition: transform 0.5s linear;
      }
    </style>

    <script>
      function getRandomInt(max) {
        // used for random position
        return Math.floor(Math.random() * max);
      }

      document.addEventListener("DOMContentLoaded", () => {
        const hidden_text = document.getElementById("hiddenText");
        const my_git = document.getElementById("myGithub");
        const my_week2HW = document.getElementById("myWeek2HW");

        const funky_mk = document.getElementById("funky_monks");
        const funky_img = funky_mk.querySelector("img");

        let oppo = 0;

        setInterval(() => {
          hidden_text.classList.toggle("hidden");
          hidden_text.classList.toggle("shown");

          if (oppo % 2) {
            my_git.style.position = "absolute";
            my_git.style.left = getRandomInt(window.innerWidth - 100) + "px"; // get random within bounds
            my_git.style.top = getRandomInt(window.innerHeight - 50) + "px";
          } else {
            my_week2HW.style.position = "absolute";
            my_week2HW.style.left =
              getRandomInt(window.innerWidth - 100) + "px"; // get random within bounds
            my_week2HW.style.top = getRandomInt(window.innerHeight - 50) + "px";
          }

          if (oppo > 20) {
            funky_mk.style.position = "fixed";
            funky_mk.style.left = "50%";
            funky_mk.style.top = "50%";
            funky_mk.style.transform = "translate(-50%, -50%)";
            funky_mk.classList.remove("hidden");
            funky_mk.classList.add("shown");

            funky_img.style.transform = `rotate(${oppo * 12}deg)`;

            if (oppo > 40) {
              oppo = 0;
              funky_mk.classList.remove("shown");
              funky_mk.classList.add("hidden");
            }
          }
          oppo++;
        }, 500);
      });
    </script>
  </head>

  <body
    style="
      background-color: rgba(50, 5, 240, 0.5);
      position: relative;
      padding: auto;
      align-content: center;
    "
  >
    <div
      style="
        align-content: flex-start;
        flex-direction: row;
        justify-content: center;
      "
    >
      <h1
        style="
          justify-content: center;
          width: 100%;
          position: relative;
          text-align: center;
        "
      >
        MY (FIRST) WEBPAGE!
      </h1>
    </div>

    <div
      id="hiddenText"
      class="hidden"
      style="text-align: center; align-items: baseline"
    >
      And this is what it looks like...
      <br />
      Bum bum bum
    </div>

    <button id="myGithub" class="gitbutton" style="position: fixed; left: 50%">
      <a href="https://github.com/DevilToasty/DevilToasty.github.io">
        THE GITHUB!
      </a>
    </button>

    <button id="myWeek2HW" class="hwButton" style="position: fixed; left: 10%">
      <a href="https://deviltoasty.github.io/Week2/BRADLEYBREEN_OurFirstGame/">
        Week 2 Assignment
      </a>
    </button>

    <!-- funky monkey mode activated-->
    <div id="funky_monks" class="hidden">
      <img
        src="./assets/funky_monkey.jpg"
        style="width: 200px; display: block; transform-origin: center center"
      />
    </div>
  </body>
</html>
