<!doctype html>

<html lang="en">
  <head>
    <link rel="stylesheet" href="./styles.css" />
    <meta charset="UTF-8" />

    <script src="./script.js" defer></script>

    <title>Mime-meter</title>
  </head>

  <body class="main-page">
    <div class="welcome_spacer">
      <p id="welcome_text"></p>
      <p id="clock"></p>
    </div>
    <br />

    <div class="container">
      <div class="text_style">
        <h1 class="mime_move_text">MIME METER!!!</h1>
        <br>
        <p>What level mime are you??</p>
      </div>
      <div class="mime">
        <div class="hand_trigger_1"></div>
        <div class="hand_trigger_2"></div>
        <div class="eyes_overlay">
          <div class="eyeball">
            <div class="pupil"></div>
          </div>
          <div class="eyeball">
            <div class="pupil"></div>
          </div>
        </div>
        <div class="speech_bubble"><br />High-five me for points!</div>
        <img src="./assets/mime-face.png" id="mime-image" />
      </div>

      <div class="meter">
        <div id="shell">
          <div id="air"></div>
          <div id="fill_level"></div>
        </div>
      </div>
    </div>
  </body>
</html>
